<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Procesador OT - Guardado en Google Sheets</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .content {
            padding: 30px;
        }

        .status-bar {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px 20px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            border-left: 4px solid #4caf50;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #4caf50;
            animation: pulse 2s infinite;
        }

        .status-dot.offline {
            background: #f44336;
            animation: none;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }

        .stats {
            display: flex;
            gap: 20px;
            font-size: 14px;
        }

        .stats div {
            padding: 5px 10px;
            background: white;
            border-radius: 5px;
        }

        .stats span {
            font-weight: bold;
            color: #667eea;
            font-size: 18px;
            margin-left: 5px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 5px;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        label.required::after {
            content: "*";
            color: #f44336;
            margin-left: 4px;
        }

        input, textarea {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
            font-family: inherit;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: 500;
            display: none;
        }

        .message.success {
            display: block;
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            display: block;
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .message.info {
            display: block;
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .records-table {
            margin-top: 30px;
            overflow-x: auto;
        }

        .records-table table {
            width: 100%;
            border-collapse: collapse;
        }

        .records-table th,
        .records-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }

        .records-table th {
            background: #f8f9fa;
            font-weight: 600;
            color: #555;
            font-size: 12px;
            text-transform: uppercase;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-group button {
            flex: 1;
        }

        .btn-excel {
            background: #28a745;
        }

        .btn-sync {
            background: #17a2b8;
        }

        .btn-clear {
            background: #dc3545;
        }

        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            
            .btn-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📊 Sistema Procesador OT</h1>
        <p>Guardado automático en Google Sheets</p>
    </div>
    
    <div class="content">
        <div class="status-bar">
            <div class="status-indicator">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">Verificando conexión...</span>
            </div>
            <div class="stats">
                <div>📝 Total Registros: <span id="totalRecords">0</span></div>
                <div>🕐 Hora: <span id="currentTime">-</span></div>
            </div>
        </div>
        
        <form id="mainForm">
            <div class="form-grid">
                <div class="form-group full-width">
                    <label class="required">📍 LÍNEA/SUBESTACIÓN</label>
                    <input type="text" name="linea" placeholder="Ej: S/E (03) Barrio Nuevo" required>
                </div>
                
                <div class="form-group full-width">
                    <label class="required">⚙️ ACTIVIDAD</label>
                    <input type="text" name="actividad" placeholder="Ej: Mantenimiento Preventivo" required>
                </div>
                
                <div class="form-group">
                    <label>📈 AVANCE SEMANAL [%]</label>
                    <input type="text" name="avance_semanal" placeholder="Ej: 75.5">
                </div>
                
                <div class="form-group">
                    <label>📊 AVANCE ACUMULADO [%]</label>
                    <input type="text" name="avance_acumulado" placeholder="Ej: 60.2">
                </div>
                
                <div class="form-group">
                    <label class="required">🔖 OT</label>
                    <input type="text" name="ot" placeholder="Número de OT" required>
                </div>
                
                <div class="form-group">
                    <label>👥 RESPONSABLES</label>
                    <input type="text" name="responsables" placeholder="Nombres de responsables">
                </div>
                
                <div class="form-group">
                    <label>👤 RESPONSABLE</label>
                    <input type="text" name="responsable" placeholder="Nombre del responsable principal">
                </div>
                
                <div class="form-group">
                    <label>📅 DÍA</label>
                    <input type="text" name="dia" placeholder="Ej: lunes - viernes">
                </div>
                
                <div class="form-group">
                    <label>👷 NÚMERO DE PERSONAS</label>
                    <input type="text" name="personas" placeholder="Cantidad de personas">
                </div>
                
                <div class="form-group">
                    <label>⏱️ HORAS HOMBRE</label>
                    <input type="text" name="horas" placeholder="Horas hombre">
                </div>
                
                <div class="form-group full-width">
                    <label>📝 ACTIVIDADES</label>
                    <textarea name="actividades" placeholder="Descripción detallada de las actividades realizadas..."></textarea>
                </div>
            </div>
            
            <button type="submit" id="submitBtn">
                💾 Guardar en Google Sheets
            </button>
        </form>
        
        <div class="btn-group">
            <button type="button" id="viewRecordsBtn" class="btn-sync">
                📋 Ver Registros Locales
            </button>
            <button type="button" id="exportExcelBtn" class="btn-excel">
                📊 Exportar a Excel
            </button>
            <button type="button" id="clearLocalBtn" class="btn-clear">
                🗑️ Limpiar Datos Locales
            </button>
        </div>
        
        <div id="recordsContainer" style="display: none;">
            <div class="records-table">
                <table id="recordsTable">
                    <thead>
                        <tr><th>No.</th><th>LÍNEA/SUBESTACIÓN</th><th>ACTIVIDAD</th><th>AVANCE SEMANAL</th><th>AVANCE ACUMULADO</th><th>OT</th><th>RESPONSABLES</th><th>RESPONSABLE</th><th>DÍA</th><th>PERSONAS</th><th>HORAS</th><th>ACTIVIDADES</th><th>FECHA</th></tr>
                    </thead>
                    <tbody id="recordsBody"></tbody>
                </table>
            </div>
        </div>
        
        <div id="messageBox" class="message"></div>
    </div>
</div>

<script>
    // Tu endpoint de Sheet.best
    const SHEET_BEST_URL = "https://api.sheetbest.com/sheets/63d8bf52-79fb-4d2e-9426-eff064fb1112";
    
    let registros = [];
    
    function loadRecords() {
        const saved = localStorage.getItem('procesadorOT_registros');
        registros = saved ? JSON.parse(saved) : [];
        updateStats();
    }
    
    function saveRecords() {
        localStorage.setItem('procesadorOT_registros', JSON.stringify(registros));
        updateStats();
    }
    
    function updateStats() {
        document.getElementById('totalRecords').textContent = registros.length;
    }
    
    function updateTime() {
        document.getElementById('currentTime').textContent = new Date().toLocaleTimeString('es-ES');
    }
    
    function showMessage(text, type) {
        const msg = document.getElementById('messageBox');
        msg.textContent = text;
        msg.className = `message ${type}`;
        setTimeout(() => msg.style.display = 'none', 5000);
    }
    
    // Función mejorada para guardar en Sheet.best
    async function saveToSheetBest(data) {
        console.log('Intentando guardar en Sheet.best:', data);
        
        try {
            const response = await fetch(SHEET_BEST_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify([data])
            });
            
            const responseText = await response.text();
            console.log('Respuesta del servidor:', response.status, responseText);
            
            if (response.ok) {
                try {
                    const jsonResponse = JSON.parse(responseText);
                    return { success: true, data: jsonResponse };
                } catch(e) {
                    return { success: true, message: 'Guardado exitoso' };
                }
            } else {
                return { success: false, error: `Error ${response.status}: ${responseText}` };
            }
        } catch (error) {
            console.error('Error de red:', error);
            return { success: false, error: error.message };
        }
    }
    
    // Probar conexión y ver estructura
    async function testSheetBestConnection() {
        try {
            const response = await fetch(SHEET_BEST_URL);
            if (response.ok) {
                const data = await response.json();
                console.log('Conexión exitosa. Datos existentes:', data);
                document.getElementById('statusDot').className = 'status-dot';
                document.getElementById('statusText').textContent = '🟢 Conectado a Sheet.best';
                return true;
            }
        } catch (error) {
            console.error('Error de conexión:', error);
        }
        document.getElementById('statusDot').className = 'status-dot offline';
        document.getElementById('statusText').textContent = '🔴 Error de conexión';
        return false;
    }
    
    async function saveRecord(data) {
        const newId = registros.length + 1;
        const fecha = new Date().toLocaleString('es-ES');
        
        // Datos para Sheet.best - Usando los nombres de columna que vimos en tu hoja
        const sheetData = {
            "No.": newId,
            "LÍNEA/SUBESTACIÓN": data.linea,
            "ACTIVIDAD": data.actividad,
            "AVANCE SEMANAL [%]": data.avance_semanal || "",
            "AVANCE ACUMULADO [%]": data.avance_acumulado || "",
            "OT": data.ot,
            "RESPONSABLES": data.responsables || "",
            "RESPONSABLE": data.responsable || "",
            "DÍA": data.dia || "",
            "NUMERO DE PERSONAS": data.personas || "",
            "HORAS HOMBRE": data.horas || "",
            "ACTIVIDADES": data.actividades || "",
            "FECHA_REGISTRO": fecha
        };
        
        // Guardar localmente
        const localRecord = {
            id: newId, linea: data.linea, actividad: data.actividad,
            avance_semanal: data.avance_semanal, avance_acumulado: data.avance_acumulado,
            ot: data.ot, responsables: data.responsables, responsable: data.responsable,
            dia: data.dia, personas: data.personas, horas: data.horas,
            actividades: data.actividades, fecha: fecha
        };
        
        registros.push(localRecord);
        saveRecords();
        
        // Intentar guardar en Sheet.best
        const result = await saveToSheetBest(sheetData);
        
        if (result.success) {
            showMessage(`✅ Registro #${newId} guardado en Google Sheets`, 'success');
        } else {
            showMessage(`⚠️ Registro #${newId} guardado SOLO LOCALMENTE. Error: ${result.error}`, 'error');
        }
        
        return newId;
    }
    
    function exportToExcel() {
        if (registros.length === 0) {
            showMessage('No hay registros para exportar', 'error');
            return;
        }
        
        const headers = ['No.','LÍNEA/SUBESTACIÓN','ACTIVIDAD','AVANCE SEMANAL','AVANCE ACUMULADO','OT','RESPONSABLES','RESPONSABLE','DÍA','PERSONAS','HORAS','ACTIVIDADES','FECHA'];
        const csvData = [headers];
        
        registros.forEach(reg => {
            csvData.push([
                reg.id, reg.linea, reg.actividad, reg.avance_semanal || '', reg.avance_acumulado || '',
                reg.ot, reg.responsables || '', reg.responsable || '', reg.dia || '',
                reg.personas || '', reg.horas || '', reg.actividades || '', reg.fecha
            ]);
        });
        
        const csvContent = csvData.map(row => row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(',')).join('\n');
        const blob = new Blob(["\uFEFF" + csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `procesador_ot_${Date.now()}.csv`;
        link.click();
        URL.revokeObjectURL(link.href);
        showMessage('✅ Exportado a Excel', 'success');
    }
    
    function displayRecords() {
        const container = document.getElementById('recordsContainer');
        const tbody = document.getElementById('recordsBody');
        
        if (registros.length === 0) {
            tbody.innerHTML = '<tr><td colspan="13" style="text-align: center;">No hay registros</td></tr>';
            container.style.display = 'block';
            return;
        }
        
        tbody.innerHTML = '';
        registros.slice().reverse().forEach(reg => {
            const row = tbody.insertRow();
            row.insertCell(0).textContent = reg.id;
            row.insertCell(1).textContent = reg.linea;
            row.insertCell(2).textContent = reg.actividad;
            row.insertCell(3).textContent = reg.avance_semanal || '-';
            row.insertCell(4).textContent = reg.avance_acumulado || '-';
            row.insertCell(5).textContent = reg.ot;
            row.insertCell(6).textContent = reg.responsables || '-';
            row.insertCell(7).textContent = reg.responsable || '-';
            row.insertCell(8).textContent = reg.dia || '-';
            row.insertCell(9).textContent = reg.personas || '-';
            row.insertCell(10).textContent = reg.horas || '-';
            row.insertCell(11).textContent = reg.actividades || '-';
            row.insertCell(12).textContent = reg.fecha || '-';
        });
        container.style.display = 'block';
    }
    
    function clearLocal() {
        if (confirm('¿Eliminar todos los registros locales?')) {
            registros = [];
            saveRecords();
            showMessage('Registros locales eliminados', 'success');
            document.getElementById('recordsContainer').style.display = 'none';
        }
    }
    
    // Event Listeners
    document.getElementById('mainForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="loading-spinner"></span> Guardando...';
        
        const formData = new FormData(e.target);
        const data = Object.fromEntries(formData.entries());
        
        try {
            const newId = await saveRecord(data);
            showMessage(`✅ Registro #${newId} guardado`, 'success');
            e.target.reset();
        } catch (error) {
            showMessage(`Error: ${error.message}`, 'error');
        } finally {
            btn.disabled = false;
            btn.innerHTML = '💾 Guardar en Google Sheets';
        }
    });
    
    document.getElementById('viewRecordsBtn').addEventListener('click', displayRecords);
    document.getElementById('exportExcelBtn').addEventListener('click', exportToExcel);
    document.getElementById('clearLocalBtn').addEventListener('click', clearLocal);
    
    // Inicializar
    updateTime();
    setInterval(updateTime, 1000);
    loadRecords();
    testSheetBestConnection();
    
    // Abrir consola para ver errores
    console.log('Sistema iniciado. Revisa la consola (F12) para ver detalles del guardado.');
</script>
</body>
</html>
