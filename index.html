<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Procesador OT - Gestión de Órdenes de Trabajo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .content {
            padding: 30px;
        }

        .status-bar {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px 20px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            border-left: 4px solid #4caf50;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #4caf50;
            animation: pulse 2s infinite;
        }

        .status-dot.offline {
            background: #f44336;
            animation: none;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }

        .stats {
            display: flex;
            gap: 20px;
            font-size: 14px;
        }

        .stats div {
            padding: 5px 10px;
            background: white;
            border-radius: 5px;
        }

        .stats span {
            font-weight: bold;
            color: #667eea;
            font-size: 18px;
            margin-left: 5px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 5px;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        label.required::after {
            content: "*";
            color: #f44336;
            margin-left: 4px;
        }

        input, textarea, select {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
            font-family: inherit;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: 500;
            display: none;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.success {
            display: block;
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            display: block;
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .message.info {
            display: block;
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .records-table {
            margin-top: 30px;
            overflow-x: auto;
        }

        .records-table table {
            width: 100%;
            border-collapse: collapse;
        }

        .records-table th,
        .records-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }

        .records-table th {
            background: #f8f9fa;
            font-weight: 600;
            color: #555;
            font-size: 12px;
            text-transform: uppercase;
        }

        .records-table tr:hover {
            background: #f8f9fa;
        }

        .btn-excel {
            background: #28a745;
            margin-top: 10px;
        }

        .btn-excel:hover {
            background: #218838;
        }

        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            
            .content {
                padding: 20px;
            }
            
            .status-bar {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .stats {
                width: 100%;
                justify-content: space-between;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📊 Sistema Procesador OT</h1>
        <p>Gestión de Órdenes de Trabajo y Actividades</p>
    </div>
    
    <div class="content">
        <div class="status-bar">
            <div class="status-indicator">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">Listo para usar</span>
            </div>
            <div class="stats">
                <div>📝 Total Registros: <span id="totalRecords">0</span></div>
                <div>🕐 Hora: <span id="currentTime">-</span></div>
            </div>
        </div>
        
        <form id="mainForm">
            <div class="form-grid">
                <div class="form-group full-width">
                    <label class="required">📌 LÍNEA</label>
                    <input type="text" name="linea" placeholder="Ej: Línea de Producción 1" required>
                </div>
                
                <div class="form-group full-width">
                    <label class="required">⚙️ ACTIVIDAD</label>
                    <input type="text" name="actividad" placeholder="Descripción de la actividad" required>
                </div>
                
                <div class="form-group">
                    <label>📈 AVANCE SEMANAL</label>
                    <input type="text" name="avance_semanal" placeholder="Ej: 75%">
                </div>
                
                <div class="form-group">
                    <label>📊 AVANCE ACUMULADO</label>
                    <input type="text" name="avance_acumulado" placeholder="Ej: 60%">
                </div>
                
                <div class="form-group">
                    <label class="required">🔖 N° OT</label>
                    <input type="text" name="ot" placeholder="Número de OT" required>
                </div>
                
                <div class="form-group">
                    <label>📅 DÍA</label>
                    <input type="text" name="dia" placeholder="Fecha o día de la semana">
                </div>
                
                <div class="form-group">
                    <label>👥 RESPONSABLES</label>
                    <input type="text" name="responsables" placeholder="Nombres de responsables">
                </div>
                
                <div class="form-group">
                    <label>👤 RESPONSABLE PRINCIPAL</label>
                    <input type="text" name="responsable" placeholder="Nombre del responsable principal">
                </div>
                
                <div class="form-group">
                    <label>👷 PERSONAS</label>
                    <input type="number" name="personas" placeholder="Cantidad de personas">
                </div>
                
                <div class="form-group">
                    <label>⏱️ HORAS</label>
                    <input type="number" step="0.5" name="horas" placeholder="Horas trabajadas">
                </div>
                
                <div class="form-group full-width">
                    <label>📝 ACTIVIDADES DETALLADAS</label>
                    <textarea name="actividades" placeholder="Descripción detallada de las actividades realizadas..."></textarea>
                </div>
            </div>
            
            <button type="submit" id="submitBtn">
                💾 Guardar Registro
            </button>
        </form>
        
        <div style="margin-top: 20px; display: flex; gap: 10px;">
            <button type="button" id="viewRecordsBtn" style="background: #17a2b8;">
                📋 Ver Registros Guardados
            </button>
            <button type="button" id="exportExcelBtn" class="btn-excel">
                📊 Exportar a Excel
            </button>
            <button type="button" id="clearAllBtn" style="background: #dc3545;">
                🗑️ Limpiar Todos los Registros
            </button>
        </div>
        
        <div id="recordsContainer" style="display: none;">
            <div class="records-table">
                <table id="recordsTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Línea</th>
                            <th>Actividad</th>
                            <th>Avance Semanal</th>
                            <th>Avance Acumulado</th>
                            <th>OT</th>
                            <th>Responsables</th>
                            <th>Responsable</th>
                            <th>Día</th>
                            <th>Personas</th>
                            <th>Horas</th>
                            <th>Actividades</th>
                            <th>Fecha</th>
                        </tr>
                    </thead>
                    <tbody id="recordsBody"></tbody>
                </table>
            </div>
        </div>
        
        <div id="messageBox" class="message"></div>
    </div>
</div>

<script>
    // Variables globales
    let registros = [];
    
    // Cargar registros del localStorage al iniciar
    function loadRecords() {
        const saved = localStorage.getItem('procesadorOT_registros');
        if (saved) {
            registros = JSON.parse(saved);
        } else {
            registros = [];
        }
        updateStats();
    }
    
    // Guardar registros en localStorage
    function saveRecords() {
        localStorage.setItem('procesadorOT_registros', JSON.stringify(registros));
        updateStats();
    }
    
    // Actualizar estadísticas
    function updateStats() {
        document.getElementById('totalRecords').textContent = registros.length;
    }
    
    // Actualizar hora actual
    function updateTime() {
        const now = new Date();
        const timeStr = now.toLocaleTimeString('es-ES');
        document.getElementById('currentTime').textContent = timeStr;
    }
    
    // Mostrar mensaje
    function showMessage(text, type) {
        const messageBox = document.getElementById('messageBox');
        messageBox.textContent = text;
        messageBox.className = `message ${type}`;
        setTimeout(() => {
            messageBox.style.display = 'none';
            messageBox.className = 'message';
        }, 5000);
    }
    
    // Mostrar todos los registros
    function displayRecords() {
        const container = document.getElementById('recordsContainer');
        const tbody = document.getElementById('recordsBody');
        
        if (registros.length === 0) {
            tbody.innerHTML = '<tr><td colspan="13" style="text-align: center;">No hay registros guardados</td></tr>';
            container.style.display = 'block';
            return;
        }
        
        tbody.innerHTML = '';
        registros.forEach(reg => {
            const row = tbody.insertRow();
            row.insertCell(0).textContent = reg.id;
            row.insertCell(1).textContent = reg.linea;
            row.insertCell(2).textContent = reg.actividad;
            row.insertCell(3).textContent = reg.avance_semanal || '-';
            row.insertCell(4).textContent = reg.avance_acumulado || '-';
            row.insertCell(5).textContent = reg.ot;
            row.insertCell(6).textContent = reg.responsables || '-';
            row.insertCell(7).textContent = reg.responsable || '-';
            row.insertCell(8).textContent = reg.dia || '-';
            row.insertCell(9).textContent = reg.personas || '-';
            row.insertCell(10).textContent = reg.horas || '-';
            row.insertCell(11).textContent = reg.actividades || '-';
            row.insertCell(12).textContent = reg.fecha || '-';
        });
        
        container.style.display = 'block';
    }
    
    // Exportar a Excel (CSV)
    function exportToExcel() {
        if (registros.length === 0) {
            showMessage('No hay registros para exportar', 'error');
            return;
        }
        
        // Preparar datos para CSV
        const headers = ['ID', 'Línea', 'Actividad', 'Avance Semanal', 'Avance Acumulado', 
                        'OT', 'Responsables', 'Responsable Principal', 'Día', 'Personas', 
                        'Horas', 'Actividades Detalladas', 'Fecha Registro'];
        
        const csvData = [headers];
        
        registros.forEach(reg => {
            csvData.push([
                reg.id,
                reg.linea,
                reg.actividad,
                reg.avance_semanal || '',
                reg.avance_acumulado || '',
                reg.ot,
                reg.responsables || '',
                reg.responsable || '',
                reg.dia || '',
                reg.personas || '',
                reg.horas || '',
                reg.actividades || '',
                reg.fecha || ''
            ]);
        });
        
        // Convertir a CSV
        const csvContent = csvData.map(row => 
            row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(',')
        ).join('\n');
        
        // Descargar archivo
        const blob = new Blob(["\uFEFF" + csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        const url = URL.createObjectURL(blob);
        link.href = url;
        link.setAttribute('download', `procesador_ot_${new Date().toISOString().slice(0,19)}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
        
        showMessage('✅ Registros exportados exitosamente', 'success');
    }
    
    // Limpiar todos los registros
    function clearAllRecords() {
        if (confirm('¿Estás seguro de que deseas eliminar TODOS los registros? Esta acción no se puede deshacer.')) {
            registros = [];
            saveRecords();
            showMessage('✅ Todos los registros han sido eliminados', 'success');
            document.getElementById('recordsContainer').style.display = 'none';
        }
    }
    
    // Guardar nuevo registro
    function saveRecord(data) {
        const newId = registros.length + 1;
        const now = new Date();
        const fechaStr = now.toLocaleString('es-ES');
        
        const nuevoRegistro = {
            id: newId,
            linea: data.linea,
            actividad: data.actividad,
            avance_semanal: data.avance_semanal || '',
            avance_acumulado: data.avance_acumulado || '',
            ot: data.ot,
            responsables: data.responsables || '',
            responsable: data.responsable || '',
            dia: data.dia || '',
            personas: data.personas || '',
            horas: data.horas || '',
            actividades: data.actividades || '',
            fecha: fechaStr
        };
        
        registros.push(nuevoRegistro);
        saveRecords();
        
        return newId;
    }
    
    // Event Listeners
    document.getElementById('mainForm').addEventListener('submit', (e) => {
        e.preventDefault();
        
        const submitBtn = document.getElementById('submitBtn');
        const originalText = submitBtn.innerHTML;
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="loading-spinner"></span> Guardando...';
        
        const formData = new FormData(e.target);
        const data = {};
        formData.forEach((value, key) => {
            data[key] = value;
        });
        
        try {
            const newId = saveRecord(data);
            showMessage(`✅ ¡Registro guardado exitosamente! Número: ${newId}`, 'success');
            e.target.reset();
            
            // Animación de éxito
            submitBtn.style.background = '#4caf50';
            setTimeout(() => {
                submitBtn.style.background = 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
            }, 1000);
        } catch (error) {
            showMessage(`❌ Error: ${error.message}`, 'error');
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerHTML = originalText;
        }
    });
    
    document.getElementById('viewRecordsBtn').addEventListener('click', () => {
        displayRecords();
    });
    
    document.getElementById('exportExcelBtn').addEventListener('click', () => {
        exportToExcel();
    });
    
    document.getElementById('clearAllBtn').addEventListener('click', () => {
        clearAllRecords();
    });
    
    // Inicializar
    updateTime();
    setInterval(updateTime, 1000);
    loadRecords();
    
    // Status visual
    document.getElementById('statusDot').className = 'status-dot';
    document.getElementById('statusText').textContent = '🟢 Sistema listo';
</script>
</body>
</html>
