<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Procesador OT - Google Sheets</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 { font-size: 32px; margin-bottom: 10px; }
        .content { padding: 30px; }
        .status-bar {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px 20px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            border-left: 4px solid #4caf50;
        }
        .status-indicator { display: flex; align-items: center; gap: 10px; }
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ffc107; /* Amarillo mientras verifica */
            animation: pulse 1.5s infinite;
        }
        .status-dot.online { background: #4caf50; animation: pulse 2s infinite; }
        .status-dot.offline { background: #f44336; animation: none; }
        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }
        .stats { display: flex; gap: 20px; font-size: 14px; }
        .stats div { padding: 5px 10px; background: white; border-radius: 5px; }
        .stats span { font-weight: bold; color: #667eea; font-size: 18px; margin-left: 5px; }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        .full-width { grid-column: 1 / -1; }
        .form-group { display: flex; flex-direction: column; }
        label {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 5px;
            color: #555;
            text-transform: uppercase;
        }
        label.required::after { content: "*"; color: #f44336; margin-left: 4px; }
        input, textarea, select {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
            font-family: inherit;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        textarea { resize: vertical; min-height: 100px; }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s;
        }
        button:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: 500;
            display: none;
        }
        .message.success { display: block; background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .message.error { display: block; background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .message.info { display: block; background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* Estilos para responsables múltiples */
        .responsables-container {
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 10px;
            background: #fafafa;
        }
        .responsable-item {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
        }
        .responsable-item input {
            flex: 1;
            margin-bottom: 0;
        }
        .btn-remove {
            background: #dc3545;
            padding: 8px 12px;
            width: auto;
            font-size: 12px;
        }
        .btn-add {
            background: #28a745;
            padding: 8px 12px;
            width: auto;
            font-size: 12px;
            margin-top: 5px;
        }
        .btn-add:hover, .btn-remove:hover {
            transform: none;
        }
        
        .info-badge {
            font-size: 11px;
            color: #666;
            margin-top: 5px;
        }
        
        @media (max-width: 768px) { 
            .form-grid { grid-template-columns: 1fr; }
            .responsable-item { flex-wrap: wrap; }
            .btn-remove { width: 100%; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📊 Sistema Procesador OT</h1>
        <p>Guardado directo en Google Sheets</p>
    </div>
    
    <div class="content">
        <div class="status-bar">
            <div class="status-indicator">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">Verificando conexión...</span>
            </div>
            <div class="stats">
                <div>🕐 Hora: <span id="currentTime">-</span></div>
            </div>
        </div>
        
        <form id="mainForm">
            <div class="form-grid">
                <div class="form-group full-width">
                    <label class="required">📍 LÍNEA/SUBESTACIÓN</label>
                    <input type="text" name="linea" placeholder="Ej: S/E (26) ALANGASI" required>
                </div>
                
                <div class="form-group full-width">
                    <label class="required">⚙️ ACTIVIDAD</label>
                    <input type="text" name="actividad" placeholder="Ej: MANTENIMIENTO PREVENTIVO" required>
                </div>
                
                <div class="form-group">
                    <label>📈 AVANCE SEMANAL [%]</label>
                    <input type="number" step="0.1" name="avance_semanal" placeholder="Ej: 75">
                </div>
                
                <div class="form-group">
                    <label>📊 AVANCE ACUMULADO [%]</label>
                    <input type="number" step="0.1" name="avance_acumulado" placeholder="Ej: 60">
                </div>
                
                <div class="form-group">
                    <label class="required">🔖 OT</label>
                    <input type="text" name="ot" placeholder="Número de OT" required>
                </div>
                
                <div class="form-group full-width">
                    <label>👥 RESPONSABLES (Múltiples)</label>
                    <div class="responsables-container" id="responsablesContainer">
                        <div class="responsable-item">
                            <input type="text" name="responsables" placeholder="Nombre del responsable 1" style="flex: 1;">
                            <button type="button" class="btn-remove" onclick="removeResponsable(this)" style="display: none;">❌</button>
                        </div>
                    </div>
                    <button type="button" class="btn-add" onclick="addResponsable()">+ Agregar otro responsable</button>
                    <div class="info-badge">💡 Puedes agregar todos los responsables necesarios</div>
                </div>
                
                <div class="form-group">
                    <label>👤 RESPONSABLE PRINCIPAL</label>
                    <input type="text" name="responsable_principal" placeholder="Nombre del responsable principal">
                </div>
                
                <div class="form-group">
                    <label>📅 DÍA</label>
                    <input type="text" name="dia" placeholder="Ej: lunes 1">
                </div>
                
                <div class="form-group">
                    <label>👷 NÚMERO DE PERSONAS</label>
                    <input type="number" name="numero_personas" id="numero_personas" value="1" min="1" step="1" placeholder="Ej: 2">
                </div>
                
                <div class="form-group">
                    <label>⏱️ HORAS TRABAJADAS</label>
                    <input type="number" name="horas_trabajadas" id="horas_trabajadas" step="0.5" placeholder="Ej: 8">
                    <div class="info-badge">⏰ Horas por persona por día</div>
                </div>
                
                <div class="form-group full-width">
                    <label>📝 ACTIVIDADES REALIZADAS</label>
                    <textarea name="actividades" placeholder="Descripción detallada de las actividades realizadas..."></textarea>
                </div>
            </div>
            
            <button type="submit" id="submitBtn">
                💾 Guardar en Google Sheets
            </button>
        </form>
        
        <div id="messageBox" class="message"></div>
    </div>
</div>

<script>
    // 🔴 TU URL DE GOOGLE APPS SCRIPT - ¡YA CONFIGURADA!
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwmRZhqPlEn4Og3cXdels398Uic9aTD0JAKqjxbAxnRTQuREg_Im48XG75zT-NF5SAscg/exec";
    
    // Función para actualizar la hora
    function updateTime() {
        document.getElementById('currentTime').textContent = new Date().toLocaleTimeString('es-ES');
    }
    
    // Mostrar mensajes al usuario
    function showMessage(text, type) {
        const msg = document.getElementById('messageBox');
        msg.textContent = text;
        msg.className = `message ${type}`;
        msg.style.display = 'block';
        setTimeout(() => {
            msg.style.display = 'none';
            msg.className = 'message';
        }, 5000);
    }
    
    // ================= MÚLTIPLES RESPONSABLES =================
    function addResponsable() {
        const container = document.getElementById('responsablesContainer');
        const items = container.getElementsByClassName('responsable-item');
        const newIndex = items.length + 1;
        
        const newItem = document.createElement('div');
        newItem.className = 'responsable-item';
        newItem.innerHTML = `
            <input type="text" name="responsables" placeholder="Nombre del responsable ${newIndex}" style="flex: 1;">
            <button type="button" class="btn-remove" onclick="removeResponsable(this)">❌</button>
        `;
        container.appendChild(newItem);
        
        // Mostrar botones de eliminar en todos los items
        Array.from(container.getElementsByClassName('btn-remove')).forEach(btn => {
            btn.style.display = 'inline-block';
        });
    }
    
    function removeResponsable(button) {
        const item = button.parentElement;
        item.remove();
        
        const container = document.getElementById('responsablesContainer');
        const items = container.getElementsByClassName('responsable-item');
        
        if (items.length === 1) {
            const remainingBtn = items[0].querySelector('.btn-remove');
            if (remainingBtn) remainingBtn.style.display = 'none';
        }
        
        Array.from(items).forEach((item, idx) => {
            const input = item.querySelector('input');
            if (input) input.placeholder = `Nombre del responsable ${idx + 1}`;
        });
    }
    
    function getResponsablesTexto() {
        const inputs = document.querySelectorAll('input[name="responsables"]');
        const responsables = Array.from(inputs)
            .map(input => input.value.trim())
            .filter(nombre => nombre !== '');
        return responsables.join('; ');
    }
    
    // ================= GUARDADO EN GOOGLE SHEETS =================
    async function saveToGoogleSheets(data) {
        try {
            // Usamos POST normal (no 'no-cors' para poder leer la respuesta)
            const response = await fetch(APPS_SCRIPT_URL, {
                method: 'POST',
                mode: 'cors', // Importante para leer la respuesta
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            
            if (response.ok) {
                const result = await response.json();
                return { success: true, message: result.message };
            } else {
                const errorText = await response.text();
                return { success: false, error: `Error ${response.status}: ${errorText}` };
            }
        } catch (error) {
            console.error('Error de red:', error);
            return { success: false, error: error.message };
        }
    }
    
    // ================= VERIFICACIÓN DE CONEXIÓN RÁPIDA =================
    // Esta función es CLAVE para que no se demore
    async function testConnection() {
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        
        // Estado: verificando
        statusDot.className = 'status-dot';
        statusText.textContent = 'Verificando conexión...';
        
        try {
            // Timeout de 5 segundos para no quedarnos esperando
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 5000);
            
            const response = await fetch(APPS_SCRIPT_URL, {
                method: 'GET',
                signal: controller.signal
            });
            
            clearTimeout(timeoutId);
            
            if (response.ok) {
                statusDot.className = 'status-dot online';
                statusText.textContent = '🟢 Conectado a Google Sheets';
                console.log('✅ Conexión exitosa');
                return true;
            } else {
                throw new Error(`HTTP ${response.status}`);
            }
        } catch (error) {
            console.warn('⚠️ Error de conexión:', error.message);
            statusDot.className = 'status-dot offline';
            statusText.textContent = '⚠️ Sin conexión (modo local)';
            return false;
        }
    }
    
    // ================= MANEJAR ENVÍO DEL FORMULARIO =================
    document.getElementById('mainForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="loading-spinner"></span> Guardando...';
        
        // Recopilar datos del formulario
        const data = {
            linea: document.querySelector('input[name="linea"]').value,
            actividad: document.querySelector('input[name="actividad"]').value,
            avance_semanal: document.querySelector('input[name="avance_semanal"]').value || '',
            avance_acumulado: document.querySelector('input[name="avance_acumulado"]').value || '',
            ot: document.querySelector('input[name="ot"]').value,
            responsables: getResponsablesTexto(),
            responsable_principal: document.querySelector('input[name="responsable_principal"]').value || '',
            dia: document.querySelector('input[name="dia"]').value || '',
            numero_personas: document.getElementById('numero_personas').value || '',
            horas_trabajadas: document.getElementById('horas_trabajadas').value || '',
            actividades: document.querySelector('textarea[name="actividades"]').value || ''
        };
        
        console.log('📤 Enviando datos:', data);
        
        try {
            const result = await saveToGoogleSheets(data);
            
            if (result.success) {
                showMessage(`✅ ¡Registro guardado exitosamente en Google Sheets!`, 'success');
                e.target.reset();
                
                // Resetear valores por defecto
                document.getElementById('numero_personas').value = '1';
                document.getElementById('horas_trabajadas').value = '';
                
                // Limpiar responsables adicionales
                const container = document.getElementById('responsablesContainer');
                while (container.children.length > 1) {
                    container.removeChild(container.lastChild);
                }
                const firstInput = container.querySelector('input');
                if (firstInput) firstInput.value = '';
                
                // Animación de éxito
                btn.style.background = '#4caf50';
                setTimeout(() => {
                    btn.style.background = 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
                }, 1000);
            } else {
                throw new Error(result.error || 'Error desconocido');
            }
        } catch (error) {
            console.error('❌ Error:', error);
            showMessage(`❌ Error al guardar: ${error.message}`, 'error');
        } finally {
            btn.disabled = false;
            btn.innerHTML = '💾 Guardar en Google Sheets';
        }
    });
    
    // ================= INICIALIZACIÓN =================
    updateTime();
    setInterval(updateTime, 1000);
    
    // Verificar conexión al cargar (rápido, con timeout)
    testConnection();
    
    // Verificar cada 60 segundos (no tan seguido para no saturar)
    setInterval(testConnection, 60000);
    
    // Ocultar botón eliminar del primer responsable
    setTimeout(() => {
        const firstRemoveBtn = document.querySelector('.responsable-item .btn-remove');
        if (firstRemoveBtn) firstRemoveBtn.style.display = 'none';
    }, 100);
</script>
</body>
</html>
