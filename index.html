<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Procesador OT - Con Google Sheets</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 { font-size: 32px; margin-bottom: 10px; }
        .content { padding: 30px; }
        .status-bar {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px 20px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            border-left: 4px solid #4caf50;
        }
        .status-indicator { display: flex; align-items: center; gap: 10px; }
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #4caf50;
            animation: pulse 2s infinite;
        }
        .status-dot.offline { background: #f44336; animation: none; }
        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }
        .stats { display: flex; gap: 20px; font-size: 14px; }
        .stats div { padding: 5px 10px; background: white; border-radius: 5px; }
        .stats span { font-weight: bold; color: #667eea; font-size: 18px; margin-left: 5px; }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        .full-width { grid-column: 1 / -1; }
        .form-group { display: flex; flex-direction: column; }
        label {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 5px;
            color: #555;
            text-transform: uppercase;
        }
        label.required::after { content: "*"; color: #f44336; margin-left: 4px; }
        input, textarea {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
            font-family: inherit;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        textarea { resize: vertical; min-height: 100px; }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s;
        }
        button:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: 500;
            display: none;
        }
        .message.success { display: block; background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .message.error { display: block; background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .message.info { display: block; background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 768px) { .form-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Sistema Procesador OT</h1>
        <p>Guardado directo en Google Sheets</p>
    </div>
    
    <div class="content">
        <div class="status-bar">
            <div class="status-indicator">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">Verificando conexión...</span>
            </div>
            <div class="stats">
                <div>Hora: <span id="currentTime">-</span></div>
            </div>
        </div>
        
        <form id="mainForm">
            <div class="form-grid">
                <div class="form-group full-width">
                    <label class="required">LÍNEA/SUBESTACIÓN</label>
                    <input type="text" name="linea" placeholder="Ej: S/E (26) ALANGASI" required>
                </div>
                
                <div class="form-group full-width">
                    <label class="required">ACTIVIDAD</label>
                    <input type="text" name="actividad" placeholder="Ej: MANTENIMIENTO PREVENTIVO" required>
                </div>
                
                <div class="form-group">
                    <label>AVANCE SEMANAL [%]</label>
                    <input type="text" name="avance_semanal" placeholder="Ej: 75">
                </div>
                
                <div class="form-group">
                    <label>AVANCE ACUMULADO [%]</label>
                    <input type="text" name="avance_acumulado" placeholder="Ej: 60">
                </div>
                
                <div class="form-group">
                    <label class="required">OT</label>
                    <input type="text" name="ot" placeholder="Número de OT" required>
                </div>
                
                <div class="form-group">
                    <label>RESPONSABLES</label>
                    <input type="text" name="responsables" placeholder="Ej: CUSI SANTIAGO PATRICIO">
                </div>
                
                <div class="form-group">
                    <label>RESPONSABLE</label>
                    <input type="text" name="responsable" placeholder="Ej: DM">
                </div>
                
                <div class="form-group">
                    <label>DÍA</label>
                    <input type="text" name="dia" placeholder="Ej: 1">
                </div>
                
                <div class="form-group">
                    <label>NÚMERO DE PERSONAS</label>
                    <input type="text" name="personas" placeholder="Ej: 1">
                </div>
                
                <div class="form-group">
                    <label>HORAS HOMBRE</label>
                    <input type="text" name="horas" placeholder="Ej: 4">
                </div>
                
                <div class="form-group full-width">
                    <label>ACTIVIDADES</label>
                    <textarea name="actividades" placeholder="Descripción detallada..."></textarea>
                </div>
            </div>
            
            <button type="submit" id="submitBtn">
                Guardar en Google Sheets
            </button>
        </form>
        
        <div id="messageBox" class="message"></div>
    </div>
</div>

<script>
    // 🔴 IMPORTANTE: REEMPLAZA ESTA URL CON LA QUE OBTUVIERAS AL DESPLEGAR
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwmRZhqPlEn4Og3cXdels398Uic9aTD0JAKqjxbAxnRTQuREg_Im48XG75zT-NF5SAscg/exec"; // <-- Pega aquí tu URL
    
    // Variables
    let registros = [];
    
    function updateTime() {
        document.getElementById('currentTime').textContent = new Date().toLocaleTimeString('es-ES');
    }
    
    function showMessage(text, type) {
        const msg = document.getElementById('messageBox');
        msg.textContent = text;
        msg.className = `message ${type}`;
        setTimeout(() => msg.style.display = 'none', 5000);
    }
    
    async function saveToGoogleSheets(data) {
        try {
            const response = await fetch(APPS_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors', // Necesario para Apps Script
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            
            // Con no-cors no podemos leer la respuesta directamente
            // Pero si no hay error, asumimos éxito
            return { success: true };
            
        } catch (error) {
            console.error('Error:', error);
            return { success: false, error: error.message };
        }
    }
    
    async function testConnection() {
        try {
            const response = await fetch(APPS_SCRIPT_URL, { method: 'GET' });
            if (response.ok) {
                document.getElementById('statusDot').className = 'status-dot';
                document.getElementById('statusText').textContent = '🟢 Conectado a Google Sheets';
                return true;
            }
        } catch(e) {
            console.log('Modo local - esperando despliegue');
        }
        document.getElementById('statusDot').className = 'status-dot offline';
        document.getElementById('statusText').textContent = 'Configurar URL de Apps Script';
        return false;
    }
    
    document.getElementById('mainForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="loading-spinner"></span> Guardando...';
        
        const formData = new FormData(e.target);
        const data = Object.fromEntries(formData.entries());
        
        try {
            const result = await saveToGoogleSheets(data);
            
            if (result.success) {
                showMessage(`Registro guardado exitosamente en Google Sheets`, 'success');
                e.target.reset();
                
                btn.style.background = '#4caf50';
                setTimeout(() => {
                    btn.style.background = 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
                }, 1000);
            } else {
                throw new Error(result.error);
            }
        } catch (error) {
            showMessage(`❌ Error: ${error.message}`, 'error');
        } finally {
            btn.disabled = false;
            btn.innerHTML = 'Guardar en Google Sheets';
        }
    });
    
    // Inicializar
    updateTime();
    setInterval(updateTime, 1000);
    testConnection();
</script>
</body>
</html>
